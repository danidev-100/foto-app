services:
  # ── PostgreSQL ──
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: foto_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (Go) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/foto_app?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 24h
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_SANDBOX: ${MP_SANDBOX:-true}
      LOG_LEVEL: info
      SHUTDOWN_TIMEOUT: 10s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (React + Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
