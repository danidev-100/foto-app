# ── Backend (Go) ──
  backend-go:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 24h
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_SANDBOX: ${MP_SANDBOX:-true}
      LOG_LEVEL: info
      SHUTDOWN_TIMEOUT: 10s
    restart: unless-stopped
    profiles:
      - go

  # ── Backend (Node.js) ──
  backend-node:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_SANDBOX: ${MP_SANDBOX:-true}
      LOG_LEVEL: info
    restart: unless-stopped
    profiles:
      - node
    command: >
      sh -c "npx prisma db push --accept-data-loss && node src/server.js"

# ── Frontend (React + Nginx) ──
frontend:
  build:
    context: ./frontend
    dockerfile: Dockerfile
  ports:
    - "${APP_PORT:-80}:80"
  depends_on:
    - backend-go
    - backend-node
  restart: unless-stopped
