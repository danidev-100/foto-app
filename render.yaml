services:
  - type: web
    name: foto-app-backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_SANDBOX
        value: "true"
      - key: SERVER_PORT
        value: "8080"
      - key: LOG_LEVEL
        value: "info"
