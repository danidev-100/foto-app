services:
  # ── Backend (Go + Docker) ──
  - type: web
    name: foto-app-backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_SANDBOX
        value: "true"
      - key: SERVER_PORT
        value: "8080"
      - key: LOG_LEVEL
        value: "info"

  # ── Frontend (React + Vite, static site) ──
  - type: web
    name: foto-app-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
